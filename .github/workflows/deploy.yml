name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  seed-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install seed dependencies
        run: |
          cd seed
          pip install -r requirements.txt

      - name: Write Firebase service account JSON to temp file
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > /tmp/serviceAccount.json

      - name: Seed Firestore with real data
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/serviceAccount.json
        run: |
          python3 seed/seed_firestore.py --wipe

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Python dependencies for Cloud Functions
        run: |
          cd functions
          pip install -r requirements.txt

      - name: Deploy to Firebase
        run: |
          firebase deploy --non-interactive --token ${{ secrets.FIREBASE_TOKEN }} \
            --project hospital-schedular-nephealer

      - name: Print live hosting URL
        run: echo "Live at: https://hospital-schedular-nephealer.web.app"
